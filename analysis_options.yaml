# Analysis options for the project
# Issue: Some lints are disabled that should be enabled

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Good: Enable important lints
    - avoid_print
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - prefer_final_locals
    - prefer_const_declarations
    - sort_constructors_first
    - sort_unnamed_constructors_first
    - unnecessary_const
    - unnecessary_new
    - use_key_in_widget_constructors

    # Issue: Disabled important security lints
    # - avoid_web_libraries_in_flutter  # Disabled - should be enabled

    # Issue: Disabled code quality lints
    # - prefer_single_quotes  # Disabled - should be enabled for consistency
    # - require_trailing_commas  # Disabled - helps with formatting

    # Issue: Missing important lints
    # - avoid_dynamic_calls
    # - avoid_slow_async_io
    # - cancel_subscriptions
    # - close_sinks
    # - comment_references
    # - literal_only_boolean_expressions
    # - no_adjacent_strings_in_list
    # - prefer_asserts_in_initializer_lists
    # - prefer_expression_function_bodies
    # - prefer_interpolation_to_compose_strings
    # - unnecessary_lambdas
    # - unnecessary_parenthesis
    # - use_build_context_synchronously

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

  # Issue: Some important errors are treated as warnings
  errors:
    # Issue: Security issues treated as warnings instead of errors
    avoid_print: warning # Should be error in production

    # Issue: Code quality issues ignored
    unused_import: ignore # Should be warning or error
    unused_local_variable: ignore # Should be warning

    # Good: Keep these as errors
    invalid_assignment: error
    missing_required_param: error
    missing_return: error

  # Issue: Language features not properly configured
  language:
    strict-casts: false # Issue: Should be true for better type safety
    strict-inference: false # Issue: Should be true
    strict-raw-types: false # Issue: Should be true
